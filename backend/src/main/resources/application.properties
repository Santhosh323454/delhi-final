spring.application.name=AyurSutraBackend

# Database Configuration (Render will override these via Env Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ayursutra?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Viji@323}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Optimization (Crucial for Render Free Tier)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Memory load-ah korakka indha line add pannunga
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server Port (Render expects port 10000 by default)
server.port=${PORT:10000}

# Secrets from Environment Variables
jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION_MS}
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}
backend.url=${BACKEND_URL:https://maxim-unbrushed-arie.ngrok-free.dev}
